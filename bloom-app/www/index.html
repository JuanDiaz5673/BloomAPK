<!-- mobile.css MUST load last so its @media (max-width: 768px) rules
     override desktop defaults on phones. Desktop users never see it. -->
<link rel="stylesheet" href="styles/mobile.css">
<style>
  /* Local fonts — loaded offline (variable font for Outfit) */
  @font-face { font-family: 'Outfit'; src: url('assets/fonts/Outfit-Latin.woff2') format('woff2'); font-weight: 200 600; font-style: normal; font-display: swap; unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
  @font-face { font-family: 'Outfit'; src: url('assets/fonts/Outfit-LatinExt.woff2') format('woff2'); font-weight: 200 600; font-style: normal; font-display: swap; unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
  @font-face { font-family: 'Cormorant Garamond'; src: url('assets/fonts/CormorantGaramond-Light.woff2') format('woff2'); font-weight: 300; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Cormorant Garamond'; src: url('assets/fonts/CormorantGaramond-Regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Cormorant Garamond'; src: url('assets/fonts/CormorantGaramond-Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
  @font-face { font-family: 'Cormorant Garamond'; src: url('assets/fonts/CormorantGaramond-SemiBold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }

  /* View container */
  #view-container {
    flex: 1; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    min-width: 0;
    scrollbar-width: none;
    -ms-overflow-style: none;
    /* Inter-view transition: opacity ONLY.
       NEVER add `transform`, `will-change`, or `filter` here — they create a compositing
       layer on this ancestor, which permanently kills `backdrop-filter` on every
       .glass-card descendant. Found this the hard way. Subtle motion can come from the
       cards' own `animation: fadeSlideUp` keyframes, which run inside themselves and
       don't break ancestor compositing. */
    transition: opacity 0.18s ease;
  }
  #view-container::-webkit-scrollbar { display: none; }
  #view-container.view-leaving {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash-screen" style="
  position: fixed; inset: 0; z-index: 99999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0f050a;
  backdrop-filter: blur(60px);
  -webkit-backdrop-filter: blur(60px);
  transition: opacity 0.5s ease, visibility 0.5s ease;
">
  <div style="position:relative;">
    <img src="assets/images/bloom-avatar.png" style="width:100px;height:100px;border-radius:50%;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(255,107,157,0.3));" alt="">
  </div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;margin-top:20px;background:linear-gradient(135deg,#fff 30%,#fab1c4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Bloom</div>
  <div style="font-family:'Outfit',sans-serif;font-size:12px;color:rgba(255,255,255,0.4);font-weight:300;margin-top:6px;letter-spacing:1px;">Loading your workspace...</div>
  <div style="margin-top:24px;width:120px;height:3px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;">
    <div id="splash-progress" style="width:0%;height:100%;border-radius:3px;background:linear-gradient(90deg,#ff6b9d,#e84393);transition:width 0.4s ease;"></div>
  </div>
</div>

<!-- Drag region for frameless window -->
<div class="titlebar-drag-region"></div>

<!-- ─── Sidebar ─── -->
<nav class="sidebar">
  <!--
    Logo + wordmark wrapper.
    The wordmark is positioned next to the logo and animates in/out with
    the sidebar expand/collapse — fades + slides from -10px to 0px so it
    looks like it's being uncovered by the panel widening, not just popping
    in. Animation lives in sidebar.css under `.sidebar-wordmark`.
  -->
  <div class="sidebar-brand">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <!--
      Each letter is a separate span so we can stagger their reveal via
      CSS — animates from left to right with a small per-letter delay so
      it reads as a deliberate "B-l-o-o-m" type-on instead of the
      whole word popping in at once. `--i` carries the index into CSS
      `transition-delay: calc(var(--i) * ...)`. aria-hidden because
      the `.sidebar-brand` parent already conveys the brand name; we
      don't want screen readers spelling it out letter by letter.
    -->
    <span class="sidebar-wordmark" aria-hidden="true">
      <span class="wm-letter" style="--i:0">B</span>
      <span class="wm-letter" style="--i:1">l</span>
      <span class="wm-letter" style="--i:2">o</span>
      <span class="wm-letter" style="--i:3">o</span>
      <span class="wm-letter" style="--i:4">m</span>
    </span>
  </div>

  <div class="nav-items">
    <div class="nav-item active" data-view="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label" data-i18n="nav_home">Home</span>
    </div>
    <!-- Study tab — Pomodoro + flashcards + stats. Slotted where Users used
         to live; Profile/Users is still reachable via the header avatar
         top-right (see Header.init() btn-avatar → Router.navigate('users')). -->
    <div class="nav-item" data-view="study">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span class="nav-label" data-i18n="nav_study">Study</span>
    </div>
    <div class="nav-item" data-view="calendar">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="nav-label" data-i18n="nav_calendar">Calendar</span>
    </div>
    <div class="nav-item" data-view="chat">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-label" data-i18n="nav_chat">Chat</span>
    </div>
    <div class="nav-item" data-view="notes">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="nav-label" data-i18n="nav_notes">Notes</span>
    </div>
    <div class="nav-item" data-view="files">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span class="nav-label" data-i18n="nav_files">Files</span>
    </div>
  </div>

  <!-- Ambient Bloom chat trigger + panel.
       Lives inside the sidebar between .nav-items and .nav-bottom.
       Click trigger → sidebar gets .chat-open class → panel fades in, avatar slides up. -->
  <button class="sidebar-bloom-trigger" id="sidebar-bloom-trigger"
          aria-label="Open Bloom chat" aria-expanded="false">
    <img src="assets/images/bloom-avatar.png" alt="" class="sidebar-bloom-avatar">
  </button>
  <div class="sidebar-bloom-panel" id="sidebar-bloom-panel"
       role="complementary" aria-label="Bloom chat">
    <div class="sidebar-bloom-header">
      <div class="sidebar-bloom-meta">
        <div class="sidebar-bloom-name">Bloom</div>
        <div class="sidebar-bloom-sub"><span class="sidebar-bloom-status-dot"></span>Ambient chat</div>
      </div>
      <button class="sidebar-bloom-close" id="sidebar-bloom-close" aria-label="Close chat">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sidebar-bloom-messages" id="sidebar-bloom-messages">
      <div class="sidebar-bloom-empty">
        Ask me anything — I can create events, jot notes, summarize your day…
      </div>
    </div>
    <div class="sidebar-bloom-input-area">
      <textarea id="sidebar-bloom-input" placeholder="Ask Bloom..." rows="1"></textarea>
      <button id="sidebar-bloom-send" aria-label="Send message">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <div class="nav-bottom">
    <div class="nav-item" data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span class="nav-label" data-i18n="nav_settings">Settings</span>
    </div>
  </div>
</nav>

<!-- ─── Main Content ─── -->
<main class="main">
  <div class="header">
    <div class="header-left">
      <h1 id="header-title">Welcome</h1>
      <p id="header-subtitle">Here's what's happening across your workspace today</p>
    </div>
    <div class="header-right">
      <button class="header-action" id="btn-search" title="Search (Ctrl+K)" aria-label="Search">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="header-action" id="btn-notifications" title="Notifications" aria-label="Notifications">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge" id="notifications-badge" style="display:none;"></span>
      </button>
      <button class="avatar" id="btn-avatar" title="Profile" aria-label="Profile" style="border:none;cursor:pointer;"><svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
    </div>
  </div>

  <div id="view-container">
    <!-- Views load here dynamically -->
  </div>
</main>
